[plugin]

name="Simple Blender Pipeline"
description="A simple 'no frills' importer for .blend and .gltf files. This plugin is largely designed around the user being able to freely 
recompose their scenes after importing without those changes being lost. It also supports godot specific material options such as the stencil
buffer."
author="Xeloph"
version="1.0"
script="simple_blender_pipeline.gd"
